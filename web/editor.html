<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Edit clip · ClipThat</title><link rel="stylesheet" href="styles.css"></head>
<body>
  <header><a class="brand" href="/">← Clips</a></header>
  <main class="editor-page"><p id="status" role="status">Loading…</p><section id="editor" hidden>
    <div class="editor-heading"><form id="titleForm" class="title-form"><label for="titleInput">Clip title</label><div class="inline-form"><input id="titleInput" maxlength="80" required><button type="submit">Rename</button></div></form><p id="dirtyState" class="state-pill">Saved revision</p></div>
    <audio id="audio" class="main-player" controls preload="metadata"></audio>
    <section class="card edit-controls"><div class="trim-grid"><label>Start <output id="startValue"></output><input id="start" type="range" min="0" step="0.1"></label><label>End <output id="endValue"></output><input id="end" type="range" min="0" step="0.1"></label></div><h2>Speakers</h2><section id="users" class="speaker-grid"></section><p id="viewOnly" class="help" hidden>You can rename and play this clip, but only its creator or a bot admin can change its audio.</p></section>
    <div class="actions editor-actions"><button id="reset" class="quiet" type="button">Reset unsaved changes</button><button id="preview" class="quiet" type="button">Preview unsaved</button><button id="save" type="button">Save revision</button><button id="favorite" class="quiet" type="button">☆ Favorite</button><button id="delete" class="danger" type="button">Move to trash</button></div>
    <section id="revisionPanel" class="card" hidden><div class="section-heading"><div><p class="eyebrow">ADMIN</p><h2>Revision history</h2></div><button id="refreshRevisions" class="quiet" type="button">Refresh</button></div><div id="revisions"></div></section>
  </section></main>
  <script src="api.js"></script><script src="editor.js"></script>
</body></html>
